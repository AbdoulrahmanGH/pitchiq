function CircularProgress({ value, max = 100, size = 72, stroke = 5, color = '#FF6B35' }) {
  const r = (size - stroke * 2) / 2;
  const circ = 2 * Math.PI * r;
  const pct = value / max;
  const [animPct, setAnimPct] = useState(0);
  useEffect(() => {const t = setTimeout(() => setAnimPct(pct), 80);return () => clearTimeout(t);}, [pct]);
  const dash = animPct * circ;
  return (
    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke} />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color}
      strokeWidth={stroke} strokeLinecap="round"
      strokeDasharray={`${dash} ${circ}`}
      style={{ transition: 'stroke-dasharray 1.2s cubic-bezier(0.4,0,0.2,1)', filter: `drop-shadow(0 0 6px ${color}88)` }} />
      
    </svg>);

}

function StatCard({ title, value, sub, children, delay = 0, glow }) {

    <div style={{

      border: '1px solid rgba(255,255,255,0.07)', borderRadius: 16,
      padding: '24px 26px', flex: 1, position: 'relative', overflow: 'hidden',
      opacity: vis ? 1 : 0, transform: vis ? 'translateY(0)' : 'translateY(16px)',
      transition: 'opacity 0.5s ease, transform 0.5s ease',
      boxShadow: glow ? '0 0 40px rgba(255,107,53,0.08)' : '0 4px 24px rgba(0,0,0,0.3)'
    }}>
      <div style={{ position: 'absolute', top: -30, right: -30, width: 80, height: 80, background: 'radial-gradient(circle, rgba(255,107,53,0.12) 0%, transparent 70%)', pointerEvents: 'none' }} />
      <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--text-secondary)', marginBottom: 14 }}>{title}</div>
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 16, justifyContent: 'space-between' }}>
        <div>
          <div style={{ fontSize: 42, fontWeight: 700, fontFamily: 'Space Grotesk', lineHeight: 1, color: 'var(--text-primary)', letterSpacing: '-1px' }}>{value}</div>
          <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 6 }}>{sub}</div>
        </div>
        {children}
      </div>
    </div>);

}

    </div>);

}

function Sparkline({ data, color = '#FF6B35', width = 80, height = 28 }) {
  const max = Math.max(...data),min = Math.min(...data);
  const pts = data.map((v, i) => {
    const x = i / (data.length - 1) * width;
    const y = height - (v - min) / (max - min || 1) * (height - 4) - 2;
    return `${x},${y}`;
  }).join(' ');
  const last = pts.split(' ').pop().split(',');
  return (
    <svg width={width} height={height} style={{ overflow: 'visible' }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round" style={{ filter: `drop-shadow(0 0 3px ${color}66)` }} />
      <circle cx={last[0]} cy={last[1]} r="2.5" fill={color} style={{ filter: `drop-shadow(0 0 4px ${color})` }} />
    </svg>);

}

                {[['Available', 18, 26, 'var(--green)'], ['Injured', 2, 26, 'var(--red)'], ['Rest', 6, 26, 'var(--yellow)']].map(([l, v, t, c]) => <div key={l} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <span style={{ fontSize: 9, color: 'var(--text-muted)', width: 44, textAlign: 'right' }}>{l}</span>
                    <div style={{ width: 60, height: 3, background: 'rgba(255,255,255,0.06)', borderRadius: 2 }}>
                      <div style={{ width: `${v / t * 100}%`, height: '100%', background: c, borderRadius: 2 }} />
                    </div>
                    <span style={{ fontSize: 9.5, fontFamily: 'Space Grotesk', fontWeight: 600, color: c, width: 14 }}>{v}</span>
                  </div>
                )}
              </div>
            </StatCard>
            <StatCard title="Saudi Pro League" value="3W · 1D · 1L" sub="Last 5 matches · +5 goal difference" delay={160}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6, alignItems: 'flex-end', flexShrink: 0 }}>
                <Sparkline data={readinessSparkline} color={acc} width={80} height={28} />
                <div style={{ fontSize: 9, color: 'var(--text-muted)', letterSpacing: '0.06em' }}>Readiness trend</div>
              </div>
            </StatCard>
          </div>

          {/* Row 2: Fatigue */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ width: 3, height: 18, background: acc, borderRadius: 2 }} />
                <div style={{ fontFamily: 'Space Grotesk', fontSize: 15, fontWeight: 600 }}>Fatigue Risk Players</div>
                <div style={{ fontSize: 11, padding: '2px 9px', borderRadius: 5, background: 'rgba(248,81,73,0.12)', color: 'var(--red)', fontWeight: 600, letterSpacing: '0.06em' }}>3 flagged</div>
              </div>
              <div style={{ fontSize: 11.5, color: acc, cursor: 'pointer', fontWeight: 500 }}>View all players →</div>
            </div>
            <div style={{ display: 'flex', gap: 18 }}>
              {fatigueData.map((p, i) => <FatigueCard key={p.name} {...p} delay={i * 80 + 240} />)}
            </div>
          </div>

          {/* Row 3: Last match + form + next */}
          <div style={{ display: 'flex', gap: 18 }}>

            {/* Feature match */}
            <div style={{ flex: '0 0 340px', background: 'linear-gradient(145deg, #1C2333 0%, #161B22 100%)', border: '1px solid rgba(255,255,255,0.07)', borderRadius: 16, overflow: 'hidden' }}>
              <div style={{ height: 6, background: `linear-gradient(90deg, transparent, ${acc}44, ${acc}, ${acc}44, transparent)` }} />
              <div style={{ padding: '20px 24px 22px' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--text-secondary)' }}>Last Match</div>
                  <div style={{ fontSize: 9.5, padding: '3px 9px', borderRadius: 5, background: 'var(--green-dim)', color: 'var(--green)', fontWeight: 700, letterSpacing: '0.1em' }}>WIN</div>
                </div>
                <div style={{ textAlign: 'center', marginBottom: 20 }}>
                  <div style={{ fontFamily: 'Space Grotesk', fontSize: 13, fontWeight: 600, color: 'var(--text-secondary)', marginBottom: 8 }}>
                    Al Qadsiah <span style={{ color: 'var(--text-muted)', fontWeight: 400, margin: '0 6px' }}>vs</span> Al-Hilal
                  </div>
                  <div style={{ fontFamily: 'Space Grotesk', fontSize: 52, fontWeight: 700, letterSpacing: '-2px', lineHeight: 1 }}>
                    <span style={{ color: 'var(--text-primary)' }}>2</span>
                    <span style={{ color: 'var(--text-muted)', margin: '0 10px', fontWeight: 300, fontSize: 36 }}>–</span>
                    <span style={{ color: 'var(--text-secondary)', opacity: 0.5 }}>1</span>
                  </div>
                  <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 10, letterSpacing: '0.06em' }}>
                    Friday 18 Apr · Prince Abdulaziz Stadium · SPL MD 27
                  </div>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', padding: '12px 16px', background: 'rgba(0,0,0,0.2)', borderRadius: 10 }}>
                  <div>
                    <div style={{ fontSize: 9.5, color: 'var(--text-muted)', marginBottom: 6, letterSpacing: '0.08em' }}>SCORERS</div>
                    {[['Pereira', "23'"], ['Al-Dawsari', "71'"]].map(([n, t]) =>
                    <div key={n} style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 3 }}>
                        <div style={{ width: 4, height: 4, borderRadius: '50%', background: 'var(--green)' }} />
                        <span style={{ fontSize: 12, color: 'var(--text-primary)', fontWeight: 500 }}>{n}</span>
                        <span style={{ fontSize: 10, color: 'var(--text-muted)' }}>{t}</span>
                      </div>
                    )}
                  </div>
                  <div style={{ textAlign: 'right' }}>
                    <div style={{ fontSize: 9.5, color: 'var(--text-muted)', marginBottom: 6, letterSpacing: '0.08em' }}>POSSESSION</div>
                    <div style={{ fontFamily: 'Space Grotesk', fontSize: 22, fontWeight: 700, color: acc }}>54%</div>
                    <div style={{ fontSize: 9, color: 'var(--text-muted)' }}>vs 46%</div>
                  </div>
                </div>
              </div>
            </div>

            {/* Recent form */}
            <div style={{ flex: 1, background: 'linear-gradient(145deg, #1C2333 0%, #161B22 100%)', border: '1px solid rgba(255,255,255,0.07)', borderRadius: 16, overflow: 'hidden' }}>
              <div style={{ padding: '20px 20px 0' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <div style={{ width: 3, height: 18, background: acc, borderRadius: 2 }} />
                    <div style={{ fontFamily: 'Space Grotesk', fontSize: 15, fontWeight: 600 }}>Recent Form</div>
                  </div>
                  <div style={{ display: 'flex', gap: 5 }}>
                    {recentMatches.map((m, i) => {
                      const c = m.result === 'W' ? 'var(--green)' : m.result === 'D' ? 'var(--yellow)' : 'var(--red)';
                      const bg = m.result === 'W' ? 'var(--green-dim)' : m.result === 'D' ? 'var(--yellow-dim)' : 'var(--red-dim)';
                      return <div key={i} style={{ width: 22, height: 22, borderRadius: 5, background: bg, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700, color: c }}>{m.result}</div>;
                    })}
                  </div>
                </div>
              </div>
              <div style={{ padding: '8px 4px 8px' }}>
                {recentMatches.map((m, i) => <MatchRow key={i} {...m} isLast={i === recentMatches.length - 1} />)}
              </div>
            </div>

            {/* Next match */}
            <div style={{ flex: '0 0 200px', background: 'linear-gradient(145deg, #1C2333 0%, #161B22 100%)', border: '1px solid rgba(255,255,255,0.07)', borderRadius: 16, padding: '20px 20px', display: 'flex', flexDirection: 'column' }}>
              <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--text-secondary)', marginBottom: 16 }}>Next Match</div>
              <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 12 }}>
                <div style={{ width: 52, height: 52, borderRadius: 12, background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.08)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                    <ellipse cx="11" cy="11" rx="9" ry="9" stroke="var(--text-secondary)" strokeWidth="1.5" opacity=".6" />
                    <line x1="11" y1="2" x2="11" y2="20" stroke="var(--text-secondary)" strokeWidth="1.2" opacity=".4" />
                    <line x1="2" y1="11" x2="20" y2="11" stroke="var(--text-secondary)" strokeWidth="1.2" opacity=".4" />
                  </svg>
                </div>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--text-primary)', marginBottom: 4 }}>Al Qadsiah</div>
                  <div style={{ fontSize: 10, color: 'var(--text-muted)', marginBottom: 6 }}>vs</div>
                  <div style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--text-primary)' }}>Al Shabab</div>
                </div>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontFamily: 'Space Grotesk', fontWeight: 700, fontSize: 16, color: acc }}>Sat 26 Apr</div>
                  <div style={{ fontSize: 10.5, color: 'var(--text-muted)', marginTop: 3 }}>20:00 AST · SPL MD 29</div>
                </div>
              </div>
              <div style={{ marginTop: 16, padding: '10px 14px', borderRadius: 10, background: 'rgba(255,107,53,0.08)', border: '1px solid rgba(255,107,53,0.15)', fontSize: 11, color: acc, fontWeight: 500, textAlign: 'center', lineHeight: 1.4 }}>
                5 days to prepare<br /><span style={{ opacity: 0.7, fontWeight: 400 }}>Home fixture</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* TWEAKS */}
      {tweaksOpen &&
      <div style={{ position: 'fixed', bottom: 24, right: 24, width: 280, background: '#1C2333', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 14, padding: 20, zIndex: 1000, boxShadow: '0 20px 60px rgba(0,0,0,0.6)' }}>
          <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 16, color: 'var(--text-primary)', fontFamily: 'Space Grotesk' }}>Tweaks</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div>
              <div style={{ fontSize: 10.5, color: 'var(--text-muted)', marginBottom: 6, letterSpacing: '0.08em' }}>ACCENT COLOR</div>
              <div style={{ display: 'flex', gap: 8 }}>
                {['#FF6B35', '#4ECDC4', '#A78BFA', '#F59E0B'].map((c) =>
              <div key={c} onClick={() => updateTweak('accentColor', c)} style={{ width: 28, height: 28, borderRadius: 7, background: c, cursor: 'pointer', border: tweaks.accentColor === c ? '2px solid white' : '2px solid transparent', transition: 'border 0.15s' }} />
              )}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 10.5, color: 'var(--text-muted)', marginBottom: 6, letterSpacing: '0.08em' }}>READINESS SCORE</div>
              <input type="range" min="50" max="100" value={tweaks.readinessScore} onChange={(e) => updateTweak('readinessScore', +e.target.value)} style={{ width: '100%', accentColor: acc }} />
              <div style={{ fontSize: 11, color: 'var(--text-secondary)', textAlign: 'right' }}>{tweaks.readinessScore}</div>
            </div>
          </div>
        </div>
      }
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
