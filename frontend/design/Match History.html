<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PitchIQ — Match History</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0D1117;
    --surface: #161B22;
    --surface2: #1C2333;
    --surface3: #21262D;
    --border: rgba(255,255,255,0.07);
    --orange: #FF6B35;
    --orange-dim: rgba(255,107,53,0.12);
    --text-primary: #E6EDF3;
    --text-secondary: #7D8590;
    --text-muted: #484F58;
    --green: #3FB950;
    --green-dim: rgba(63,185,80,0.12);
    --red: #F85149;
    --red-dim: rgba(248,81,73,0.12);
    --yellow: #D29922;
    --yellow-dim: rgba(210,153,34,0.13);
  }
  html, body, #root { width: 100%; height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text-primary); overflow: hidden; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const IconDash = () => (
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".9"/>
    <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/>
    <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/>
    <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/>
  </svg>
);
const IconPlayers = () => (
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <circle cx="8" cy="5" r="3" fill="currentColor" opacity=".9"/>
    <path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" opacity=".9"/>
  </svg>
);
const IconMatches = () => (
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <circle cx="8" cy="8" r="6.5" stroke="currentColor" strokeWidth="1.3" opacity=".9"/>
    <path d="M8 1.5C8 1.5 6 5 6 8s2 6.5 2 6.5M1.5 8h13M3 4.5C4.5 5.5 6 6 8 6s3.5-.5 5-1.5M3 11.5C4.5 10.5 6 10 8 10s3.5.5 5 1.5" stroke="currentColor" strokeWidth="1.1" strokeLinecap="round" opacity=".7"/>
  </svg>
);
const IconSquad = () => (
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <path d="M1 8h14M8 1v14M4 3l8 10M12 3L4 13" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" opacity=".9"/>
  </svg>
);

function NavItem({ icon, label, active, onClick }) {
  const [hov, setHov] = useState(false);
  return (
    <div onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} style={{
      display: 'flex', alignItems: 'center', gap: 11, padding: '10px 14px', borderRadius: 9, cursor: 'pointer',
      color: active ? 'var(--orange)' : hov ? 'var(--text-primary)' : 'var(--text-secondary)',
      background: active ? 'rgba(255,107,53,0.1)' : hov ? 'rgba(255,255,255,0.04)' : 'transparent',
      transition: 'all 0.18s', fontSize: 13.5, fontWeight: active ? 600 : 400, position: 'relative',
    }}>
      {active && <div style={{ position: 'absolute', left: 0, top: '50%', transform: 'translateY(-50%)', width: 3, height: 18, background: 'var(--orange)', borderRadius: '0 3px 3px 0' }}/>}
      {icon}{label}
    </div>
  );
}

/* Possession bar */
function PossessionBar({ pct, color }) {
  const opp = 100 - pct;
  return (
    <div style={{ width: '100%' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
        <span style={{ fontSize: 10, color: 'var(--text-muted)', letterSpacing: '0.06em' }}>POSSESSION</span>
        <span style={{ fontFamily: 'Space Grotesk', fontSize: 13, fontWeight: 700, color }}>{pct}%</span>
      </div>
      <div style={{ height: 4, background: 'rgba(255,255,255,0.06)', borderRadius: 2, overflow: 'hidden', display: 'flex' }}>
        <div style={{ width: `${pct}%`, height: '100%', background: color, borderRadius: '2px 0 0 2px', transition: 'width 0.8s ease' }}/>
        <div style={{ flex: 1, background: 'rgba(255,255,255,0.04)' }}/>
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 3 }}>
        <span style={{ fontSize: 9, color: 'var(--text-muted)' }}>AQF</span>
        <span style={{ fontSize: 9, color: 'var(--text-muted)' }}>OPP {opp}%</span>
      </div>
    </div>
  );
}

/* Match card */
function MatchCard({ match, acc }) {
  const [hov, setHov] = useState(false);

  const resMap = {
    WIN:  { color: 'var(--green)',  bg: 'var(--green-dim)',  border: 'rgba(63,185,80,0.2)',  label: 'WIN',  dot: '#3FB950' },
    DRAW: { color: 'var(--yellow)', bg: 'var(--yellow-dim)', border: 'rgba(210,153,34,0.2)', label: 'DRAW', dot: '#D29922' },
    LOSS: { color: 'var(--red)',    bg: 'var(--red-dim)',    border: 'rgba(248,81,73,0.2)',  label: 'LOSS', dot: '#F85149' },
  };
  const res = resMap[match.result];
  const posColor = match.result === 'WIN' ? 'var(--green)' : match.result === 'DRAW' ? 'var(--yellow)' : 'var(--red)';

  // Split score for display
  const [homeScore, awayScore] = match.score.split('-').map(Number);
  const aqHome = match.home === 'Al Qadsiah';
  const aqScore = aqHome ? homeScore : awayScore;
  const oppScore = aqHome ? awayScore : homeScore;
  const opponent = aqHome ? match.away : match.home;

  return (
    <div
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        background: hov
          ? 'linear-gradient(145deg, #20293A 0%, #1A2230 100%)'
          : 'linear-gradient(145deg, #1C2333 0%, #161B22 100%)',
        border: hov ? `1px solid rgba(255,107,53,0.18)` : '1px solid rgba(255,255,255,0.07)',
        borderRadius: 16,
        padding: '22px 28px',
        display: 'flex',
        alignItems: 'center',
        gap: 0,
        transition: 'background 0.2s, border 0.2s, box-shadow 0.2s',
        boxShadow: hov ? '0 8px 32px rgba(0,0,0,0.4)' : '0 4px 16px rgba(0,0,0,0.25)',
        position: 'relative',
        overflow: 'hidden',
        cursor: 'default',
      }}
    >
      {/* Left accent line by result */}
      <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 3, background: res.color, borderRadius: '3px 0 0 3px' }}/>

      {/* Date */}
      <div style={{ width: 80, flexShrink: 0, paddingLeft: 8 }}>
        <div style={{ fontFamily: 'Space Grotesk', fontSize: 13, fontWeight: 700, color: 'var(--text-secondary)', letterSpacing: '0.02em' }}>{match.date}</div>
        <div style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 3, letterSpacing: '0.06em' }}>
          {match.location === 'HOME' ? 'Home' : 'Away'}
        </div>
        <div style={{ marginTop: 6, display: 'inline-block', fontSize: 8.5, fontWeight: 700, letterSpacing: '0.08em', padding: '2px 7px', borderRadius: 4, background: match.location === 'HOME' ? 'rgba(88,166,255,0.1)' : 'rgba(255,255,255,0.06)', color: match.location === 'HOME' ? '#58A6FF' : 'var(--text-muted)', border: `1px solid ${match.location === 'HOME' ? 'rgba(88,166,255,0.2)' : 'rgba(255,255,255,0.07)'}` }}>
          {match.location}
        </div>
      </div>

      {/* Divider */}
      <div style={{ width: 1, height: 56, background: 'rgba(255,255,255,0.05)', margin: '0 28px', flexShrink: 0 }}/>

      {/* Teams & Score — always Al Qadsiah on left */}
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 0 }}>
        {/* AQ side */}
        <div style={{ flex: 1, textAlign: 'right', paddingRight: 20 }}>
          <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--text-primary)', marginBottom: 2 }}>Al Qadsiah</div>
          <div style={{ fontSize: 10, color: 'var(--text-muted)', letterSpacing: '0.04em' }}>Al Qadsiah FC</div>
        </div>

        {/* Score box */}
        <div style={{ flexShrink: 0, textAlign: 'center' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <div style={{ fontFamily: 'Space Grotesk', fontSize: 38, fontWeight: 700, lineHeight: 1, letterSpacing: '-1px', color: match.result !== 'LOSS' ? 'var(--text-primary)' : 'rgba(230,237,243,0.5)' }}>{aqScore}</div>
            <div style={{ fontFamily: 'Space Grotesk', fontSize: 22, fontWeight: 300, color: 'var(--text-muted)', lineHeight: 1 }}>—</div>
            <div style={{ fontFamily: 'Space Grotesk', fontSize: 38, fontWeight: 700, lineHeight: 1, letterSpacing: '-1px', color: match.result === 'LOSS' ? 'rgba(248,81,73,0.7)' : 'rgba(230,237,243,0.35)' }}>{oppScore}</div>
          </div>
          <div style={{ marginTop: 6, display: 'flex', justifyContent: 'center' }}>
            <div style={{ fontSize: 9, fontWeight: 700, padding: '3px 10px', borderRadius: 5, background: res.bg, color: res.color, border: `1px solid ${res.border}`, letterSpacing: '0.1em' }}>{res.label}</div>
          </div>
        </div>

        {/* Opponent side */}
        <div style={{ flex: 1, textAlign: 'left', paddingLeft: 20 }}>
          <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--text-secondary)', marginBottom: 2 }}>{opponent}</div>
          <div style={{ fontSize: 10, color: 'var(--text-muted)', letterSpacing: '0.04em' }}>{match.venue}</div>
        </div>
      </div>

      {/* Divider */}
      <div style={{ width: 1, height: 56, background: 'rgba(255,255,255,0.05)', margin: '0 28px', flexShrink: 0 }}/>

      {/* Possession */}
      <div style={{ width: 160, flexShrink: 0 }}>
        <PossessionBar pct={match.possession} color={posColor}/>
      </div>
    </div>
  );
}

const MATCHES = [
  { date: 'Feb 07', home: 'Al Qadsiah', away: 'Al-Hilal',   score: '2-1', result: 'WIN',  location: 'HOME', venue: 'Prince Abdulaziz Stadium',  possession: 48.5 },
  { date: 'Feb 21', home: 'Al-Nassr',   away: 'Al Qadsiah', score: '3-1', result: 'LOSS', location: 'AWAY', venue: 'Al-Awwal Park',              possession: 42.0 },
  { date: 'Mar 07', home: 'Al Qadsiah', away: 'Al-Ittihad', score: '1-1', result: 'DRAW', location: 'HOME', venue: 'Prince Abdulaziz Stadium',  possession: 51.5 },
  { date: 'Mar 21', home: 'Al-Shabab',  away: 'Al Qadsiah', score: '0-2', result: 'WIN',  location: 'AWAY', venue: 'King Fahd Stadium',          possession: 55.0 },
  { date: 'Apr 04', home: 'Al Qadsiah', away: 'Al-Ettifaq', score: '0-2', result: 'LOSS', location: 'HOME', venue: 'Prince Abdulaziz Stadium',  possession: 46.8 },
];

function App() {
  const [activeNav, setActiveNav] = useState('Matches');
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweaks] = useState(/*EDITMODE-BEGIN*/{
    "accentColor": "#FF6B35",
    "showVenue": true
  }/*EDITMODE-END*/);

  React.useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const updateTweak = (key, val) => {
    setTweaks(p => ({ ...p, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  const acc = tweaks.accentColor;

  const navItems = [
    { id: 'Dashboard',   icon: <IconDash/>,    label: 'Dashboard' },
    { id: 'Players',     icon: <IconPlayers/>, label: 'Players' },
    { id: 'Matches',     icon: <IconMatches/>, label: 'Matches' },
    { id: 'Squad Depth', icon: <IconSquad/>,   label: 'Squad Depth' },
  ];

  const wins   = MATCHES.filter(m => m.result === 'WIN').length;
  const draws  = MATCHES.filter(m => m.result === 'DRAW').length;
  const losses = MATCHES.filter(m => m.result === 'LOSS').length;
  const goalsF = MATCHES.reduce((a, m) => {
    const [h, aw] = m.score.split('-').map(Number);
    return a + (m.home === 'Al Qadsiah' ? h : aw);
  }, 0);
  const goalsA = MATCHES.reduce((a, m) => {
    const [h, aw] = m.score.split('-').map(Number);
    return a + (m.home === 'Al Qadsiah' ? aw : h);
  }, 0);

  const summaryCards = [
    { label: 'Matches Played', value: String(MATCHES.length), color: acc, sub: 'SPL 2025/26' },
    { label: 'Wins',           value: String(wins),           color: 'var(--green)',  sub: `${wins * 3} points` },
    { label: 'Draws',          value: String(draws),          color: 'var(--yellow)', sub: `${draws} point${draws !== 1 ? 's' : ''}` },
    { label: 'Losses',         value: String(losses),         color: 'var(--red)',    sub: `Goals ${goalsF}–${goalsA}` },
  ];

  return (
    <div style={{ display: 'flex', height: '100vh', width: '100vw', overflow: 'hidden', background: 'var(--bg)' }}>

      {/* SIDEBAR */}
      <div style={{ width: 220, flexShrink: 0, background: 'linear-gradient(180deg, #131920 0%, #111519 100%)', borderRight: '1px solid rgba(255,255,255,0.06)', display: 'flex', flexDirection: 'column', padding: '0 12px' }}>
        <div style={{ padding: '24px 6px 28px', borderBottom: '1px solid rgba(255,255,255,0.05)', marginBottom: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 28, height: 28, borderRadius: 7, background: `linear-gradient(135deg, ${acc}, #c94a1a)`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <ellipse cx="7" cy="7" rx="5.5" ry="5.5" stroke="white" strokeWidth="1.2" opacity=".8"/>
                <line x1="7" y1="1.5" x2="7" y2="12.5" stroke="white" strokeWidth="1" opacity=".6"/>
                <line x1="1.5" y1="7" x2="12.5" y2="7" stroke="white" strokeWidth="1" opacity=".6"/>
              </svg>
            </div>
            <div>
              <div style={{ fontFamily: 'Space Grotesk', fontWeight: 700, fontSize: 17, color: acc, letterSpacing: '0.04em' }}>PitchIQ</div>
              <div style={{ fontSize: 9.5, color: 'var(--text-muted)', letterSpacing: '0.08em', marginTop: -1 }}>AL QADSIAH FC</div>
            </div>
          </div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
          <div style={{ fontSize: 9.5, fontWeight: 700, letterSpacing: '0.14em', color: 'var(--text-muted)', padding: '4px 14px 8px', textTransform: 'uppercase' }}>Analytics</div>
          {navItems.map(n => <NavItem key={n.id} icon={n.icon} label={n.label} active={activeNav === n.id} onClick={() => setActiveNav(n.id)}/>)}
        </div>
        <div style={{ marginTop: 'auto', padding: '20px 6px 24px' }}>
          <div style={{ fontSize: 9.5, fontWeight: 600, letterSpacing: '0.1em', color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: 10 }}>2024–25 Season</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {[['W','3','var(--green)'], ['D','1','var(--yellow)'], ['L','1','var(--red)']].map(([l, v, c]) => (
              <div key={l} style={{ flex: 1, textAlign: 'center', padding: '8px 4px', background: 'rgba(255,255,255,0.03)', borderRadius: 8, border: '1px solid rgba(255,255,255,0.05)' }}>
                <div style={{ fontFamily: 'Space Grotesk', fontWeight: 700, fontSize: 17, color: c }}>{v}</div>
                <div style={{ fontSize: 9, color: 'var(--text-muted)', letterSpacing: '0.1em' }}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{ borderTop: '1px solid rgba(255,255,255,0.05)', marginTop: 20, paddingTop: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
              <div style={{ width: 28, height: 28, borderRadius: 8, background: 'rgba(255,255,255,0.05)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <circle cx="6" cy="4.5" r="2.5" fill="var(--text-muted)"/>
                  <path d="M1 11c0-2.761 2.239-4 5-4s5 1.239 5 4" stroke="var(--text-muted)" strokeWidth="1.2" strokeLinecap="round"/>
                </svg>
              </div>
              <div>
                <div style={{ fontSize: 11.5, fontWeight: 500, color: 'var(--text-secondary)' }}>Analyst</div>
                <div style={{ fontSize: 10, color: 'var(--text-muted)' }}>Performance Staff</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* MAIN */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

        {/* Top bar */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 32px', height: 60, borderBottom: '1px solid rgba(255,255,255,0.05)', background: 'rgba(13,17,23,0.7)', backdropFilter: 'blur(12px)', flexShrink: 0 }}>
          <div>
            <div style={{ fontFamily: 'Space Grotesk', fontSize: 18, fontWeight: 600 }}>Match History</div>
            <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 1 }}>Saudi Pro League 2025/26</div>
          </div>
          {/* Form pills */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ fontSize: 10, color: 'var(--text-muted)', marginRight: 4, letterSpacing: '0.08em' }}>FORM</span>
            {MATCHES.map((m, i) => {
              const c  = m.result === 'WIN' ? 'var(--green)' : m.result === 'DRAW' ? 'var(--yellow)' : 'var(--red)';
              const bg = m.result === 'WIN' ? 'var(--green-dim)' : m.result === 'DRAW' ? 'var(--yellow-dim)' : 'var(--red-dim)';
              return <div key={i} style={{ width: 26, height: 26, borderRadius: 6, background: bg, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10.5, fontWeight: 700, color: c }}>{m.result[0]}</div>;
            })}
          </div>
        </div>

        {/* Scroll area */}
        <div style={{ flex: 1, overflowY: 'auto', padding: '28px 32px 48px' }}>

          {/* Summary cards */}
          <div style={{ display: 'flex', gap: 16, marginBottom: 28 }}>
            {summaryCards.map(({ label, value, color, sub }) => (
              <div key={label} style={{
                flex: 1,
                background: 'linear-gradient(145deg, #1C2333 0%, #161B22 100%)',
                border: '1px solid rgba(255,255,255,0.07)',
                borderRadius: 14, padding: '20px 24px',
                position: 'relative', overflow: 'hidden',
                boxShadow: '0 4px 20px rgba(0,0,0,0.3)',
              }}>
                <div style={{ position: 'absolute', top: -20, right: -20, width: 72, height: 72, background: `radial-gradient(circle, ${color}1A 0%, transparent 70%)`, pointerEvents: 'none' }}/>
                <div style={{ fontSize: 10.5, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--text-secondary)', marginBottom: 12 }}>{label}</div>
                <div style={{ fontFamily: 'Space Grotesk', fontSize: 44, fontWeight: 700, lineHeight: 1, letterSpacing: '-2px', color }}>{value}</div>
                <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 8 }}>{sub}</div>
              </div>
            ))}
          </div>

          {/* Section header */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
            <div style={{ width: 3, height: 18, background: acc, borderRadius: 2 }}/>
            <div style={{ fontFamily: 'Space Grotesk', fontSize: 15, fontWeight: 600 }}>All Matches</div>
            <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>{MATCHES.length} results</div>
          </div>

          {/* Match cards */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {MATCHES.map((m, i) => <MatchCard key={i} match={m} acc={acc}/>)}
          </div>

          <div style={{ marginTop: 20, fontSize: 11, color: 'var(--text-muted)', textAlign: 'right' }}>
            Data updated: 21 Apr 2026
          </div>
        </div>
      </div>

      {/* TWEAKS */}
      {tweaksOpen && (
        <div style={{ position: 'fixed', bottom: 24, right: 24, width: 260, background: '#1C2333', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 14, padding: 20, zIndex: 1000, boxShadow: '0 20px 60px rgba(0,0,0,0.6)' }}>
          <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 16, color: 'var(--text-primary)', fontFamily: 'Space Grotesk' }}>Tweaks</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div>
              <div style={{ fontSize: 10.5, color: 'var(--text-muted)', marginBottom: 6, letterSpacing: '0.08em' }}>ACCENT COLOR</div>
              <div style={{ display: 'flex', gap: 8 }}>
                {['#FF6B35','#4ECDC4','#A78BFA','#F59E0B'].map(c => (
                  <div key={c} onClick={() => updateTweak('accentColor', c)} style={{ width: 28, height: 28, borderRadius: 7, background: c, cursor: 'pointer', border: tweaks.accentColor === c ? '2px solid white' : '2px solid transparent', transition: 'border 0.15s' }}/>
                ))}
              </div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <span style={{ fontSize: 10.5, color: 'var(--text-muted)', letterSpacing: '0.08em' }}>SHOW VENUE</span>
              <div onClick={() => updateTweak('showVenue', !tweaks.showVenue)} style={{ width: 36, height: 20, borderRadius: 10, background: tweaks.showVenue ? acc : 'rgba(255,255,255,0.1)', cursor: 'pointer', position: 'relative', transition: 'background 0.2s' }}>
                <div style={{ position: 'absolute', top: 3, left: tweaks.showVenue ? 18 : 3, width: 14, height: 14, borderRadius: '50%', background: 'white', transition: 'left 0.2s', boxShadow: '0 1px 4px rgba(0,0,0,0.4)' }}/>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
