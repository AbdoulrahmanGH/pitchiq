<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PitchIQ — Player Performance Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0D1117;
    --sidebar: #111519;
    --surface: #161B22;
    --surface2: #1C2333;
    --surface3: #21262D;
    --border: rgba(255,255,255,0.07);
    --orange: #FF6B35;
    --orange-dim: rgba(255,107,53,0.12);
    --text-primary: #E6EDF3;
    --text-secondary: #7D8590;
    --text-muted: #484F58;
    --green: #3FB950;
    --green-dim: rgba(63,185,80,0.12);
    --red: #F85149;
    --red-dim: rgba(248,81,73,0.12);
    --yellow: #D29922;
    --yellow-dim: rgba(210,153,34,0.13);
    --blue: #58A6FF;
    --blue-dim: rgba(88,166,255,0.12);
    --purple: #A78BFA;
    --purple-dim: rgba(167,139,250,0.12);
  }
  html, body, #root {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text-primary);
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

/* ── Icons ── */
const IconDash = () => (
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".9"/>
    <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/>
    <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/>
    <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".5"/>
  </svg>
);
const IconPlayers = () => (
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <circle cx="8" cy="5" r="3" fill="currentColor" opacity=".9"/>
    <path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" opacity=".9"/>
  </svg>
);
const IconMatches = () => (
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <circle cx="8" cy="8" r="6.5" stroke="currentColor" strokeWidth="1.3" opacity=".9"/>
    <path d="M8 1.5C8 1.5 6 5 6 8s2 6.5 2 6.5M1.5 8h13M3 4.5C4.5 5.5 6 6 8 6s3.5-.5 5-1.5M3 11.5C4.5 10.5 6 10 8 10s3.5.5 5 1.5" stroke="currentColor" strokeWidth="1.1" strokeLinecap="round" opacity=".7"/>
  </svg>
);
const IconSquad = () => (
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
    <path d="M1 8h14M8 1v14M4 3l8 10M12 3L4 13" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" opacity=".9"/>
  </svg>
);
const IconSort = ({ dir }) => (
  <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style={{ marginLeft: 4, flexShrink: 0 }}>
    {dir === 'asc'
      ? <path d="M5 2L8.5 7H1.5L5 2Z" fill="currentColor" opacity="0.9"/>
      : dir === 'desc'
      ? <path d="M5 8L1.5 3H8.5L5 8Z" fill="currentColor" opacity="0.9"/>
      : <>
          <path d="M5 1.5L7.5 4.5H2.5L5 1.5Z" fill="currentColor" opacity="0.25"/>
          <path d="M5 8.5L2.5 5.5H7.5L5 8.5Z" fill="currentColor" opacity="0.25"/>
        </>
    }
  </svg>
);

/* ── Position badge ── */
const posMeta = {
  GK:  { color: 'var(--blue)',   bg: 'var(--blue-dim)' },
  DEF: { color: 'var(--green)',  bg: 'var(--green-dim)' },
  MID: { color: 'var(--purple)', bg: 'var(--purple-dim)' },
  FWD: { color: 'var(--orange)', bg: 'var(--orange-dim)' },
};
const PosBadge = ({ pos }) => {
  const m = posMeta[pos] || { color: 'var(--text-muted)', bg: 'rgba(255,255,255,0.06)' };
  return (
    <span style={{ fontSize: 9.5, fontWeight: 700, letterSpacing: '0.08em', padding: '2px 7px', borderRadius: 4, background: m.bg, color: m.color }}>
      {pos}
    </span>
  );
};

/* ── Status badge ── */
const StatusBadge = ({ status }) => {
  if (status === 'AT RISK') {
    return <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.08em', padding: '3px 8px', borderRadius: 5, background: 'var(--red-dim)', color: 'var(--red)', border: '1px solid rgba(248,81,73,0.2)' }}>AT RISK</span>;
  }
  if (status === 'INJURED') {
    return <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.08em', padding: '3px 8px', borderRadius: 5, background: 'rgba(210,153,34,0.15)', color: 'var(--yellow)', border: '1px solid rgba(210,153,34,0.2)' }}>INJURED</span>;
  }
  return <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.08em', padding: '3px 8px', borderRadius: 5, background: 'var(--green-dim)', color: 'var(--green)', border: '1px solid rgba(63,185,80,0.2)' }}>FIT</span>;
};

/* ── Mini bar (for shots/passes scaled display) ── */
const MiniPill = ({ value, max, color }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
    <span style={{ fontFamily: 'Space Grotesk', fontWeight: 600, fontSize: 12, color: 'var(--text-primary)', minWidth: 24 }}>{value}</span>
    <div style={{ width: 36, height: 3, background: 'rgba(255,255,255,0.06)', borderRadius: 2 }}>
      <div style={{ width: `${Math.min(value / max * 100, 100)}%`, height: '100%', background: color, borderRadius: 2 }}/>
    </div>
  </div>
);

/* ── Nav item ── */
function NavItem({ icon, label, active, onClick }) {
  const [hov, setHov] = useState(false);
  return (
    <div onClick={onClick} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} style={{
      display: 'flex', alignItems: 'center', gap: 11, padding: '10px 14px', borderRadius: 9, cursor: 'pointer',
      color: active ? 'var(--orange)' : hov ? 'var(--text-primary)' : 'var(--text-secondary)',
      background: active ? 'rgba(255,107,53,0.1)' : hov ? 'rgba(255,255,255,0.04)' : 'transparent',
      transition: 'all 0.18s', fontSize: 13.5, fontWeight: active ? 600 : 400, position: 'relative',
    }}>
      {active && <div style={{ position: 'absolute', left: 0, top: '50%', transform: 'translateY(-50%)', width: 3, height: 18, background: 'var(--orange)', borderRadius: '0 3px 3px 0' }}/>}
      {icon}{label}
    </div>
  );
}

/* ── Player data ── */
const PLAYERS = [
  { name: 'Yasser Al-Shahrani', number: '3',  pos: 'DEF', matches: 5, mins: 450, goals: 0, assists: 1, shots: 4,  passes: 312, dist: 11.2, sprints: 48, status: 'FIT' },
  { name: 'Ali Al-Bulayhi',     number: '5',  pos: 'DEF', matches: 5, mins: 450, goals: 1, assists: 0, shots: 6,  passes: 287, dist: 10.8, sprints: 42, status: 'FIT' },
  { name: 'Salem Al-Dawsari',   number: '10', pos: 'MID', matches: 5, mins: 423, goals: 3, assists: 2, shots: 14, passes: 198, dist: 11.4, sprints: 61, status: 'AT RISK' },
  { name: 'Matheus Pereira',    number: '7',  pos: 'MID', matches: 5, mins: 438, goals: 2, assists: 3, shots: 11, passes: 241, dist: 10.9, sprints: 57, status: 'AT RISK' },
  { name: 'Abdulrahman Ghareeb',number: '17', pos: 'FWD', matches: 5, mins: 390, goals: 2, assists: 0, shots: 16, passes: 134, dist: 10.6, sprints: 72, status: 'AT RISK' },
  { name: 'Firas Al-Buraikan',  number: '9',  pos: 'FWD', matches: 4, mins: 318, goals: 1, assists: 1, shots: 9,  passes: 102, dist: 10.1, sprints: 58, status: 'FIT' },
  { name: 'Mohammed Al-Burayk', number: '13', pos: 'DEF', matches: 5, mins: 450, goals: 0, assists: 2, shots: 2,  passes: 334, dist: 11.0, sprints: 39, status: 'FIT' },
  { name: 'Abdullah Radif',     number: '8',  pos: 'MID', matches: 5, mins: 410, goals: 0, assists: 1, shots: 7,  passes: 276, dist: 11.6, sprints: 64, status: 'FIT' },
  { name: 'Nasser Al-Dawsari',  number: '21', pos: 'MID', matches: 3, mins: 194, goals: 0, assists: 0, shots: 3,  passes: 143, dist: 10.3, sprints: 31, status: 'INJURED' },
  { name: 'Mohammed Al-Rubaie', number: '1',  pos: 'GK',  matches: 5, mins: 450, goals: 0, assists: 0, shots: 0,  passes: 178, dist: 5.2,  sprints: 12, status: 'FIT' },
  { name: 'Hamad Al-Yami',      number: '22', pos: 'DEF', matches: 4, mins: 360, goals: 0, assists: 1, shots: 3,  passes: 261, dist: 10.7, sprints: 36, status: 'FIT' },
  { name: 'Omar Al-Soma',       number: '11', pos: 'FWD', matches: 5, mins: 445, goals: 3, assists: 1, shots: 18, passes: 88,  dist: 10.4, sprints: 66, status: 'FIT' },
];

const COLUMNS = [
  { key: 'name',     label: 'Player',         numeric: false, flex: '1 1 160px' },
  { key: 'pos',      label: 'Pos',            numeric: false, flex: '0 0 60px', center: true },
  { key: 'matches',  label: 'MP',             numeric: true,  flex: '0 0 50px', center: true },
  { key: 'mins',     label: 'Mins',           numeric: true,  flex: '0 0 62px', center: true },
  { key: 'goals',    label: 'Goals',          numeric: true,  flex: '0 0 68px', center: true },
  { key: 'assists',  label: 'Assists',        numeric: true,  flex: '0 0 68px', center: true },
  { key: 'shots',    label: 'Shots',          numeric: true,  flex: '0 0 100px' },
  { key: 'passes',   label: 'Passes',         numeric: true,  flex: '0 0 106px' },
  { key: 'dist',     label: 'Avg Dist',       numeric: true,  flex: '0 0 90px', center: true },
  { key: 'sprints',  label: 'Sprints',        numeric: true,  flex: '0 0 76px', center: true },
  { key: 'status',   label: 'Status',         numeric: false, flex: '0 0 90px', center: true },
];

function App() {
  const [activeNav, setActiveNav] = useState('Players');
  const [sortKey, setSortKey] = useState('goals');
  const [sortDir, setSortDir] = useState('desc');
  const [filterPos, setFilterPos] = useState('ALL');
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweaks] = useState(/*EDITMODE-BEGIN*/{
    "accentColor": "#FF6B35",
    "showMiniBar": true,
    "rowDensity": "normal"
  }/*EDITMODE-END*/);

  React.useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  const acc = tweaks.accentColor;
  const rowPad = tweaks.rowDensity === 'compact' ? '9px 16px' : '13px 16px';

  const navItems = [
    { id: 'Dashboard',   icon: <IconDash/>,    label: 'Dashboard' },
    { id: 'Players',     icon: <IconPlayers/>, label: 'Players' },
    { id: 'Matches',     icon: <IconMatches/>, label: 'Matches' },
    { id: 'Squad Depth', icon: <IconSquad/>,   label: 'Squad Depth' },
  ];

  const handleSort = (key) => {
    if (sortKey === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir('desc'); }
  };

  const sorted = useMemo(() => {
    let rows = filterPos === 'ALL' ? [...PLAYERS] : PLAYERS.filter(p => p.pos === filterPos);
    rows.sort((a, b) => {
      const av = a[sortKey], bv = b[sortKey];
      if (typeof av === 'string') return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortDir === 'asc' ? av - bv : bv - av;
    });
    return rows;
  }, [sortKey, sortDir, filterPos]);

  const maxShots = Math.max(...PLAYERS.map(p => p.shots));
  const maxPasses = Math.max(...PLAYERS.map(p => p.passes));

  return (
    <div style={{ display: 'flex', height: '100vh', width: '100vw', overflow: 'hidden', background: 'var(--bg)' }}>

      {/* ── SIDEBAR ── */}
      <div style={{ width: 220, flexShrink: 0, background: 'linear-gradient(180deg, #131920 0%, #111519 100%)', borderRight: '1px solid rgba(255,255,255,0.06)', display: 'flex', flexDirection: 'column', padding: '0 12px' }}>
        <div style={{ padding: '24px 6px 28px', borderBottom: '1px solid rgba(255,255,255,0.05)', marginBottom: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 28, height: 28, borderRadius: 7, background: `linear-gradient(135deg, ${acc}, #c94a1a)`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <ellipse cx="7" cy="7" rx="5.5" ry="5.5" stroke="white" strokeWidth="1.2" opacity=".8"/>
                <line x1="7" y1="1.5" x2="7" y2="12.5" stroke="white" strokeWidth="1" opacity=".6"/>
                <line x1="1.5" y1="7" x2="12.5" y2="7" stroke="white" strokeWidth="1" opacity=".6"/>
              </svg>
            </div>
            <div>
              <div style={{ fontFamily: 'Space Grotesk', fontWeight: 700, fontSize: 17, color: acc, letterSpacing: '0.04em' }}>PitchIQ</div>
              <div style={{ fontSize: 9.5, color: 'var(--text-muted)', letterSpacing: '0.08em', marginTop: -1 }}>AL QADSIAH FC</div>
            </div>
          </div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
          <div style={{ fontSize: 9.5, fontWeight: 700, letterSpacing: '0.14em', color: 'var(--text-muted)', padding: '4px 14px 8px', textTransform: 'uppercase' }}>Analytics</div>
          {navItems.map(n => <NavItem key={n.id} icon={n.icon} label={n.label} active={activeNav === n.id} onClick={() => setActiveNav(n.id)}/>)}
        </div>
        <div style={{ marginTop: 'auto', padding: '20px 6px 24px' }}>
          <div style={{ fontSize: 9.5, fontWeight: 600, letterSpacing: '0.1em', color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: 10 }}>2024–25 Season</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {[['W','3','var(--green)'], ['D','1','var(--yellow)'], ['L','1','var(--red)']].map(([l, v, c]) => (
              <div key={l} style={{ flex: 1, textAlign: 'center', padding: '8px 4px', background: 'rgba(255,255,255,0.03)', borderRadius: 8, border: '1px solid rgba(255,255,255,0.05)' }}>
                <div style={{ fontFamily: 'Space Grotesk', fontWeight: 700, fontSize: 17, color: c }}>{v}</div>
                <div style={{ fontSize: 9, color: 'var(--text-muted)', letterSpacing: '0.1em' }}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{ borderTop: '1px solid rgba(255,255,255,0.05)', marginTop: 20, paddingTop: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
              <div style={{ width: 28, height: 28, borderRadius: 8, background: 'rgba(255,255,255,0.05)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <circle cx="6" cy="4.5" r="2.5" fill="var(--text-muted)"/>
                  <path d="M1 11c0-2.761 2.239-4 5-4s5 1.239 5 4" stroke="var(--text-muted)" strokeWidth="1.2" strokeLinecap="round"/>
                </svg>
              </div>
              <div>
                <div style={{ fontSize: 11.5, fontWeight: 500, color: 'var(--text-secondary)' }}>Analyst</div>
                <div style={{ fontSize: 10, color: 'var(--text-muted)' }}>Performance Staff</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* ── MAIN ── */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

        {/* Top bar */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 32px', height: 60, borderBottom: '1px solid rgba(255,255,255,0.05)', background: 'rgba(13,17,23,0.7)', backdropFilter: 'blur(12px)', flexShrink: 0 }}>
          <div>
            <div style={{ fontFamily: 'Space Grotesk', fontSize: 18, fontWeight: 600 }}>Player Performance</div>
            <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 1 }}>Saudi Pro League 2025/26 · 5 Matches</div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            {/* Position filter */}
            {['ALL', 'GK', 'DEF', 'MID', 'FWD'].map(p => {
              const m = posMeta[p] || {};
              const isActive = filterPos === p;
              return (
                <div key={p} onClick={() => setFilterPos(p)} style={{
                  padding: '5px 12px', borderRadius: 7, fontSize: 11, fontWeight: 600,
                  cursor: 'pointer', letterSpacing: '0.08em',
                  background: isActive ? (p === 'ALL' ? `rgba(255,107,53,0.12)` : m.bg) : 'rgba(255,255,255,0.04)',
                  color: isActive ? (p === 'ALL' ? acc : m.color) : 'var(--text-secondary)',
                  border: `1px solid ${isActive ? (p === 'ALL' ? `rgba(255,107,53,0.25)` : m.color + '44') : 'rgba(255,255,255,0.07)'}`,
                  transition: 'all 0.15s',
                }}>{p}</div>
              );
            })}
          </div>
        </div>

        <div style={{ flex: 1, overflowY: 'auto', padding: '24px 32px 40px' }}>

          {/* ── Summary stats ── */}
          <div style={{ display: 'flex', gap: 16, marginBottom: 24 }}>
            {[
              { label: 'Total Goals', value: '8', icon: '⚽', color: acc },
              { label: 'Total Assists', value: '6', icon: '🅰', color: 'var(--blue)' },
              { label: 'Avg Distance / Match', value: '10.8km', icon: '📍', color: 'var(--green)' },
            ].map(({ label, value, color }) => (
              <div key={label} style={{
                flex: 1,
                background: 'linear-gradient(145deg, #1C2333 0%, #161B22 100%)',
                border: '1px solid rgba(255,255,255,0.07)',
                borderRadius: 14, padding: '20px 24px',
                position: 'relative', overflow: 'hidden',
                boxShadow: '0 4px 20px rgba(0,0,0,0.3)',
              }}>
                <div style={{ position: 'absolute', top: -20, right: -20, width: 70, height: 70, borderRadius: '50%', background: `radial-gradient(circle, ${color}18 0%, transparent 70%)`, pointerEvents: 'none' }}/>
                <div style={{ fontSize: 10.5, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--text-secondary)', marginBottom: 10 }}>{label}</div>
                <div style={{ fontFamily: 'Space Grotesk', fontSize: 40, fontWeight: 700, lineHeight: 1, color: 'var(--text-primary)', letterSpacing: '-1px' }}>{value}</div>
                <div style={{ marginTop: 10, height: 2, background: 'rgba(255,255,255,0.05)', borderRadius: 1 }}>
                  <div style={{ height: '100%', width: '60%', background: `linear-gradient(90deg, transparent, ${color})`, borderRadius: 1 }}/>
                </div>
              </div>
            ))}
          </div>

          {/* ── Table ── */}
          <div style={{
            background: 'linear-gradient(145deg, #1C2333 0%, #161B22 100%)',
            border: '1px solid rgba(255,255,255,0.07)',
            borderRadius: 16, overflow: 'hidden',
          }}>
            {/* Table header */}
            <div style={{ display: 'flex', alignItems: 'center', padding: '0 16px', borderBottom: '1px solid rgba(255,255,255,0.06)', background: 'rgba(0,0,0,0.15)' }}>
              {COLUMNS.map(col => (
                <div
                  key={col.key}
                  onClick={() => col.key !== 'status' && handleSort(col.key)}
                  style={{
                    flex: col.flex, padding: '12px 8px',
                    fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase',
                    color: sortKey === col.key ? acc : 'var(--text-muted)',
                    cursor: col.key !== 'status' ? 'pointer' : 'default',
                    display: 'flex', alignItems: 'center',
                    justifyContent: col.center ? 'center' : 'flex-start',
                    userSelect: 'none',
                    transition: 'color 0.15s',
                  }}
                >
                  {col.label}
                  {col.key !== 'status' && <IconSort dir={sortKey === col.key ? sortDir : null}/>}
                </div>
              ))}
            </div>

            {/* Table rows */}
            {sorted.map((p, i) => <TableRow key={p.name} player={p} i={i} acc={acc} rowPad={rowPad} maxShots={maxShots} maxPasses={maxPasses} showBar={tweaks.showMiniBar}/>)}
          </div>

          {/* Footer note */}
          <div style={{ marginTop: 16, fontSize: 11, color: 'var(--text-muted)', display: 'flex', justifyContent: 'space-between' }}>
            <span>{sorted.length} players · Click column headers to sort</span>
            <span>Data updated: 21 Apr 2026</span>
          </div>
        </div>
      </div>

      {/* ── TWEAKS ── */}
      {tweaksOpen && (
        <div style={{ position: 'fixed', bottom: 24, right: 24, width: 260, background: '#1C2333', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 14, padding: 20, zIndex: 1000, boxShadow: '0 20px 60px rgba(0,0,0,0.6)' }}>
          <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 16, color: 'var(--text-primary)', fontFamily: 'Space Grotesk' }}>Tweaks</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div>
              <div style={{ fontSize: 10.5, color: 'var(--text-muted)', marginBottom: 6, letterSpacing: '0.08em' }}>ACCENT COLOR</div>
              <div style={{ display: 'flex', gap: 8 }}>
                {['#FF6B35','#4ECDC4','#A78BFA','#F59E0B'].map(c => (
                  <div key={c} onClick={() => updateTweak('accentColor', c)} style={{ width: 28, height: 28, borderRadius: 7, background: c, cursor: 'pointer', border: tweaks.accentColor === c ? '2px solid white' : '2px solid transparent', transition: 'border 0.15s' }}/>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 10.5, color: 'var(--text-muted)', marginBottom: 6, letterSpacing: '0.08em' }}>ROW DENSITY</div>
              <div style={{ display: 'flex', gap: 6 }}>
                {['normal', 'compact'].map(d => (
                  <div key={d} onClick={() => updateTweak('rowDensity', d)} style={{ flex: 1, textAlign: 'center', padding: '6px', borderRadius: 7, cursor: 'pointer', fontSize: 11, fontWeight: 600, background: tweaks.rowDensity === d ? 'rgba(255,107,53,0.15)' : 'rgba(255,255,255,0.04)', color: tweaks.rowDensity === d ? acc : 'var(--text-secondary)', border: `1px solid ${tweaks.rowDensity === d ? 'rgba(255,107,53,0.3)' : 'rgba(255,255,255,0.07)'}`, transition: 'all 0.15s', textTransform: 'capitalize' }}>{d}</div>
                ))}
              </div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <span style={{ fontSize: 10.5, color: 'var(--text-muted)', letterSpacing: '0.08em' }}>MINI BARS</span>
              <div onClick={() => updateTweak('showMiniBar', !tweaks.showMiniBar)} style={{ width: 36, height: 20, borderRadius: 10, background: tweaks.showMiniBar ? acc : 'rgba(255,255,255,0.1)', cursor: 'pointer', position: 'relative', transition: 'background 0.2s' }}>
                <div style={{ position: 'absolute', top: 3, left: tweaks.showMiniBar ? 18 : 3, width: 14, height: 14, borderRadius: '50%', background: 'white', transition: 'left 0.2s', boxShadow: '0 1px 4px rgba(0,0,0,0.4)' }}/>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TableRow({ player: p, i, acc, rowPad, maxShots, maxPasses, showBar }) {
  const [hov, setHov] = useState(false);
  return (
    <div
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        display: 'flex', alignItems: 'center', padding: `0 16px`,
        borderBottom: i < PLAYERS.length - 1 ? '1px solid rgba(255,255,255,0.04)' : 'none',
        background: hov ? 'rgba(255,255,255,0.03)' : 'transparent',
        transition: 'background 0.15s',
        cursor: 'default',
      }}
    >
      {/* Player name */}
      <div style={{ flex: '1 1 160px', display: 'flex', alignItems: 'center', gap: 10, padding: rowPad }}>
        <div style={{ width: 30, height: 30, borderRadius: 8, background: 'linear-gradient(135deg, #252D3A, #1A2030)', border: '1px solid rgba(255,255,255,0.08)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10.5, fontFamily: 'Space Grotesk', fontWeight: 700, color: 'var(--text-muted)', flexShrink: 0 }}>{p.number}</div>
        <span style={{ fontSize: 13, fontWeight: 500, color: 'var(--text-primary)', whiteSpace: 'nowrap' }}>{p.name}</span>
      </div>
      {/* Pos */}
      <div style={{ flex: '0 0 60px', display: 'flex', justifyContent: 'center', padding: rowPad }}><PosBadge pos={p.pos}/></div>
      {/* MP */}
      <div style={{ flex: '0 0 50px', textAlign: 'center', padding: rowPad, fontFamily: 'Space Grotesk', fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)' }}>{p.matches}</div>
      {/* Mins */}
      <div style={{ flex: '0 0 62px', textAlign: 'center', padding: rowPad, fontFamily: 'Space Grotesk', fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)' }}>{p.mins}</div>
      {/* Goals */}
      <div style={{ flex: '0 0 68px', textAlign: 'center', padding: rowPad }}>
        <span style={{ fontFamily: 'Space Grotesk', fontSize: 13, fontWeight: 700, color: p.goals > 0 ? acc : 'var(--text-muted)' }}>{p.goals}</span>
      </div>
      {/* Assists */}
      <div style={{ flex: '0 0 68px', textAlign: 'center', padding: rowPad }}>
        <span style={{ fontFamily: 'Space Grotesk', fontSize: 13, fontWeight: 700, color: p.assists > 0 ? 'var(--blue)' : 'var(--text-muted)' }}>{p.assists}</span>
      </div>
      {/* Shots */}
      <div style={{ flex: '0 0 100px', padding: rowPad }}>
        {showBar ? <MiniPill value={p.shots} max={maxShots} color={acc}/> : <span style={{ fontFamily: 'Space Grotesk', fontSize: 12, fontWeight: 600, color: 'var(--text-primary)' }}>{p.shots}</span>}
      </div>
      {/* Passes */}
      <div style={{ flex: '0 0 106px', padding: rowPad }}>
        {showBar ? <MiniPill value={p.passes} max={maxPasses} color="var(--purple)"/> : <span style={{ fontFamily: 'Space Grotesk', fontSize: 12, fontWeight: 600, color: 'var(--text-primary)' }}>{p.passes}</span>}
      </div>
      {/* Avg Dist */}
      <div style={{ flex: '0 0 90px', textAlign: 'center', padding: rowPad, fontFamily: 'Space Grotesk', fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)' }}>{p.dist}km</div>
      {/* Sprints */}
      <div style={{ flex: '0 0 76px', textAlign: 'center', padding: rowPad, fontFamily: 'Space Grotesk', fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)' }}>{p.sprints}</div>
      {/* Status */}
      <div style={{ flex: '0 0 90px', display: 'flex', justifyContent: 'center', padding: rowPad }}><StatusBadge status={p.status}/></div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
